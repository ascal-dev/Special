<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Stream</title>
    
   
    <style>
        /* Force remove all spacing and scrolls */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden; /* Critical: stops any scrolling */
            position: fixed; /* Critical: locks the body for mobile */
        }

        /* The container that holds the player */
        .fullscreen-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="fullscreen-frame">
        <iframe 
            src="https://player.kick.com/abhi745" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>


</body>
</html>
