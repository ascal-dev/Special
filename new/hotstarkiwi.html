<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        #player-container{width:100%;height:100%;}
        video{width:100%;height:100%;}
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const CONFIG = {
    // CHANGE THIS TO YOUR WORKER URL
    proxy: "https://hot.godess.workers.dev/?url=",
    streamUrl: "https://livetv.hotstar.com/mp1/gec-india-1540065782/fce958099ca84fc3b980e651a4a668a8/index.mpd",
    keyId: "b7cdde012ce04e90a08b90622e020000",
    key: "13603245acab444faef6cab5198de55f",
    cookieUrl: "https://raw.githubusercontent.com/ascal-dev/matchlinks-jsontom3u/main/cookies.json"
};

async function initPlayer() {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;

    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player();
    await player.attach(video);

    const ui = new shaka.ui.Overlay(player, container, video);

    // Fetch the cookie first
    let cookieValue = "";
    try {
        const res = await fetch(CONFIG.cookieUrl);
        const data = await res.json();
        cookieValue = data.cookie || "";
    } catch (e) { console.error("Cookie fetch failed"); }

    player.configure({
        drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
        streaming: { lowLatencyMode: true }
    });

    // The Filter that forces everything through the proxy
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        let originalUri = request.uris[0];
        
        // Append token if missing
        if (cookieValue && !originalUri.includes("__hdnea__")) {
            let token = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;
            const sep = originalUri.includes("?") ? "&" : "?";
            originalUri += sep + "__hdnea__=" + token;
        }

        // Wrap the final URL in the proxy
        request.uris[0] = CONFIG.proxy + encodeURIComponent(originalUri);
    });

    try {
        await player.load(CONFIG.streamUrl);
        console.log("Stream loaded successfully!");
    } catch (e) {
        console.error("Error loading stream:", e);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
