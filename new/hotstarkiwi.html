<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Titan Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;height:100vh;overflow:hidden;font-family:sans-serif}
        #player-container{width:100%;height:100%;background:#000}
        video{width:100%;height:100%}
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const CONFIG = {
    proxy: "https://hot.godess.workers.dev/?url=",
    streamUrl: "https://livetv.hotstar.com/mp1/gec-india-1540065782/fce958099ca84fc3b980e651a4a668a8/index.mpd",
    keyId: "b7cdde012ce04e90a08b90622e020000",
    key: "13603245acab444faef6cab5198de55f",
    cookieUrl: "https://raw.githubusercontent.com/ascal-dev/matchlinks-jsontom3u/main/cookies.json"
};

async function initApp() {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;

    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player();
    
    // UI Setup
    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({ 'controlPanelElements': ["play_pause", "mute", "quality", "fullscreen"] });

    // 1. Fetch Authorization Data
    let cookieValue = "";
    try {
        const res = await fetch(CONFIG.cookieUrl);
        const data = await res.json();
        cookieValue = data.cookie || "";
    } catch (e) { console.warn("Could not fetch cookies"); }

    // 2. Configure DRM & Performance
    player.configure({
        drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
        streaming: {
            bufferingGoal: 15,
            rebufferingGoal: 2,
            lowLatencyMode: true
        }
    });

    // 3. The Proxy Filter
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        let uri = request.uris[0];

        // Only proxy Hotstar links (skip local blobs or ui scripts)
        if (uri.includes('hotstar.com')) {
            // Attach cookie token if present
            if (cookieValue && !uri.includes("__hdnea__")) {
                let cleanToken = cookieValue.replace("__hdnea__=", "");
                uri += (uri.includes("?") ? "&" : "?") + "__hdnea__=" + cleanToken;
            }
            
            // Wrap in Worker URL
            request.uris[0] = CONFIG.proxy + encodeURIComponent(uri);
        }
    });

    try {
        await player.attach(video);
        await player.load(CONFIG.streamUrl);
        video.muted = false; // Unmute once play starts
    } catch (e) {
        console.error("Load Error Code:", e.code, e);
    }
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
