<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Dillzy </title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FMP9REY96D');
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
        
        .shaka-video-container{
            position:fixed;
            inset:0;
            background:#000;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        
        video{
            width:100%;
            height:100%;
            object-fit:contain;
            background:#000;
        }
        
        .custom-watermark{
            position:absolute;
            z-index:40;
            pointer-events:none;
            top:65%;
            left:6%;
            transform:translateY(-50%);
            font-size:11px;
            font-weight:600;
            color:rgba(255,255,255,0.12);
        }

        @media(max-width:700px){
            .custom-watermark{font-size:9px;top:60%;left:16%}
        }
    </style>
</head>

<body>

    <div class="shaka-video-container" id="player-container">
        <video id="video" autoplay muted playsinline preload="metadata"></video>
        <div class="custom-watermark"> </div>
    </div>

    <script>
        (function() {
            const CONFIG = {
                streamUrl: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
                keyId: "400131994b445d8c8817202248760fda",
                key: "2d56cb6f07a75b9aff165d534ae2bfc4",
                cookieUrl: "https://raw.githubusercontent.com/dilzyking/Allrounder/main/api/cookie.json"
            };

            document.addEventListener("DOMContentLoaded", async () => {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) return;

                const video = document.getElementById("video");
                const container = document.getElementById("player-container");

                video.muted = true;

                const player = new shaka.Player();
                await player.attach(video);

                const ui = new shaka.ui.Overlay(player, container, video);

                ui.configure({
                    addBigPlayButton: true,
                    controlPanelElements: [
                        "mute", 
                        "play_pause", 
                        "time_and_duration", 
                        "spacer",
                        "quality",
                        "picture_in_picture",
                        "fullscreen"
                    ],
                    seekBarColors: {
                        base: "white",
                        buffered: "red",
                        played: "green"
                    }
                });

                player.configure({
                    drm: {
                        clearKeys: {
                            [CONFIG.keyId]: CONFIG.key
                        }
                    },
                    manifest: {
                        defaultPresentationDelay: 5
                    },
                    streaming: {
                        lowLatencyMode: true,
                        bufferingGoal: 10,
                        rebufferingGoal: 2,
                        safeSeekOffset: 5
                    }
                });

                let cookieValue = "";

                try {
                    const response = await fetch(CONFIG.cookieUrl, {
                        cache: "no-store"
                    });
                    const data = await response.json();
                    cookieValue = data.cookie || "";
                } catch (e) {}

                if (cookieValue) {
                    player.getNetworkingEngine().registerRequestFilter((type, request) => {
                        request.headers["Referer"] = "https://www.jiotv.com/";
                        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                        request.headers["Cookie"] = cookieValue;

                        let urlCookie = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;

                        if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
                                type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
                            !request.uris[0].includes("__hdnea__")) {
                            const sep = request.uris[0].includes("?") ? "&" : "?";
                            request.uris[0] += sep + "__hdnea__=" + urlCookie;
                        }
                    });
                }

                try {
                    await player.load(CONFIG.streamUrl);
                    video.play().catch(() => {});
                } catch (e) {}

                video.addEventListener("play", () => {
                    video.muted = false;
                });
            });
        })();
    </script>
    <script>
        (function(s) {
            s.dataset.zone = '10603308', s.src = 'https://bvtpk.com/tag.min.js'
        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
    </script>
</body>
</html>
