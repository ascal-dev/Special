<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Live</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        #player-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .custom-watermark {
            position: absolute;
            z-index: 40;
            pointer-events: none;
            top: 65%;
            left: 6%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
    
<body>

<div id="player-container" data-shaka-player-container>
    <video id="video" autoplay muted playsinline data-shaka-player></video>
    <div class="custom-watermark"></div>
</div>

<script>
(function() {
    const CONFIG = {
        streamUrl: "https://jiotvpllive.cdn.jit.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
        keyId:"400131994b445d8c8817202248760fda",
        key:"2d56cb6f07a75b9aff165d534ae2bfc4",
        cookieUrl:"https://raw.githubusercontent.com/dilzyking/Allrounder/main/api/star-1-hindi.json"
    };

    document.addEventListener("DOMContentLoaded", async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById("video");
        const container = document.getElementById("player-container");

        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);

        // UI Configuration (Applied exactly as requested)
        ui.configure({
            controlPanelElements: [
                'play_pause',
                'time_and_duration',
                'mute',
                'volume',
                'spacer',
                'language',
                'captions',
                'picture_in_picture',
                'quality',
                'fullscreen'
            ],
            volumeBarColors: {
                base: 'rgba(63, 187, 1, 1)',
                level: 'rgb(255, 69, 0)'
            },
            seekBarColors: {
                base: 'rgb(41, 41, 163)',
                buffered: 'rgb(35, 99, 3)',
                played: 'rgba(63, 187, 1, 1)'
            }
        });

       

      player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming: {
                        lowLatencyMode: true,
                        bufferingGoal: 60, // Increased from 15 to 60 seconds
                        rebufferingGoal: 20, // Increased from 2 to 20 seconds
                        bufferBehind: 30, // Increased from 15 to 30 seconds
                        alwaysStreaming: true, // Enable always streaming mode
                        retryParameters: {
                            timeout: 15000, // Increased from 10000 to 15000
                            maxAttempts: 10, // Increased from 5 to 10
                            baseDelay: 500, // Increased from 300 to 500
                            backoffFactor: 1.5 // Increased from 1.2 to 1.5
                        },
                        segmentRequestTimeout: 15000, // Increased from 8000 to 15000
                        segmentPrefetchLimit: 10, // Increased from 2 to 10
                        useNativeHlsOnSafari: true,
                        smallGapLimit: 0.5, // Add small gap handling
                        jumpLargeGaps: true, // Jump large gaps instead of stalling
                        stallEnabled: true, // Enable stall detection
                        stallThreshold: 2, // Stall threshold in seconds
                        rebufferingEnabled: true, // Enable rebuffering
                        durationBackoff: 1, // Duration backoff
                        ignoreTextStreamFailures: true, // Ignore text stream failures
                        ignoreManifestUpdateFailures: true, // Ignore manifest update failures
                        manifestUpdateRetryParameters: {
                            timeout: 10000,
                            maxAttempts: 5
                        }
                    },
                    manifest: {
                        retryParameters: {
                            timeout: 15000, // Increased from 8000 to 15000
                            maxAttempts: 10, // Increased from 3 to 10
                            backoffFactor: 1.5
                        },
                        dash: {
                            ignoreMinBufferTime: true, // Ignore min buffer time from manifest
                            autoCorrectDrift: true, // Auto correct drift
                            initialSegmentLimit: 2000 // Increased segment limit
                        }
                    },
                    offline: {
                        usePersistentLicense: false
                    },
                    abr: {
                        enabled: true,
                        defaultBandwidthEstimate: 8000000, // 8 Mbps default bandwidth
                        switchInterval: 2, // Check ABR every 2 seconds
                        bandwidthUpgradeTarget: 0.7, // Upgrade at 70% usage
                        bandwidthDowngradeTarget: 0.5, // Downgrade at 50% usage
                        restrictions: {
                            minWidth: 320,
                            maxWidth: 1920,
                            minHeight: 240,
                            maxHeight: 1080,
                            minPixels: 76800,
                            maxPixels: 2073600
                        }
                    }
    });

        // Networking Engine Filters
        let cookieValue = "";
        try {
            const response = await fetch(CONFIG.cookieUrl, { cache: "no-store" });
            const data = await response.json();
            cookieValue = data.cookie || "";
        } catch (e) {}

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            
            if (cookieValue) {
                request.headers["Cookie"] = cookieValue;
                let token = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;

                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
                    !request.uris[0].includes("__hdnea__")) {
                    const sep = request.uris[0].includes("?") ? "&" : "?";
                    request.uris[0] += sep + "__hdnea__=" + token;
                }
            }
        });

        // Load Stream
        try {
            await player.load(CONFIG.streamUrl);
            video.play().catch(() => {
                console.log("Autoplay blocked. Click the player to start audio.");
            });
        } catch (e) {
            console.error("Error loading stream", e);
        }

        // Auto-unmute on first play
        video.addEventListener("play", () => {
            video.muted = false;
        }, { once: true });
    });
})();
</script>

</body>
</html>
