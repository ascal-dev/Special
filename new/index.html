<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Stream Hub</title>
    <style>
        :root {
            --bg: #080808;
            --card-bg: #121212;
            --accent: #00ff88;
            --text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 15px;
            text-decoration: none;
            color: var(--text);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card h2 {
            margin: 10px 0 5px 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: #fff;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: bold;
            z-index: 2;
        }

        .status-text {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Global Sports Hub</h1>

    <div class="grid">
        <a href="hindi.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://img10.hotstar.com/image/upload/f_auto,q_90,w_1920/sources/r1/cms/prod/7433/567433-h" alt="Hindi">
            </div>
            <h2>Star Sports Hindi</h2>
            <div class="status-text">FHD • Dual Audio</div>
        </a>

        <a href="ptv.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="" alt="PTV">
            </div>
            <h2>PTV Sports</h2>
            <div class="status-text">Official HD</div>
        </a>

        <a href="starzplaycricbuzz.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Cricbuzz_Logo.png" style="object-fit: contain; padding: 10px;" alt="Cricbuzz">
            </div>
            <h2>StarzPlay Cricbuzz</h2>
            <div class="status-text">Premium Stream</div>
        </a>

        <a href="tnt.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/TNT_Sports_logo.svg/2560px-TNT_Sports_logo.svg.png" style="object-fit: contain; padding: 10px;" alt="TNT">
            </div>
            <h2>TNT Sports 1</h2>
            <div class="status-text">UK Feed</div>
        </a>

        <a href="tnt2.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/TNT_Sports_logo.svg/2560px-TNT_Sports_logo.svg.png" style="object-fit: contain; padding: 10px;" alt="TNT2">
            </div>
            <h2>TNT Sports 2</h2>
            <div class="status-text">UK Feed</div>
        </a>

        <a href="willow.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/03/Willow_TV_logo.png/250px-Willow_TV_logo.png" style="object-fit: contain; padding: 15px;" alt="Willow">
            </div>
            <h2>Willow TV</h2>
            <div class="status-text">US Cricket</div>
        </a>

        <a href="willow2.html" class="card">
            <div class="badge">LIVE</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/03/Willow_TV_logo.png/250px-Willow_TV_logo.png" style="object-fit: contain; padding: 15px;" alt="Willow2">
            </div>
            <h2>Willow TV 2</h2>
            <div class="status-text">US Cricket</div>
        </a>

        <a href="ioswillow" class="card">
            <div class="badge" style="background:#555">IOS</div>
            <div class="img-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Apple-logo.png" style="object-fit: contain; padding: 20px;" alt="iOS">
            </div>
            <h2>iOS Willow</h2>
            <div class="status-text">Direct Link</div>
        </a>
    </div>

</body>
</html>
