<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Dillzy </title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .custom-watermark {
            position: absolute;
            z-index: 40;
            pointer-events: none;
            top: 65%;
            left: 6%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.12);
        }

        @media(max-width:700px) {
            .custom-watermark { font-size: 9px; top: 60%; left: 16%; }
        }
    </style>
</head>
    
<body>

<div class="shaka-video-container" id="player-container" data-shaka-player-container>
    <video id="video" autoplay muted playsinline preload="metadata" data-shaka-player></video>
    <div class="custom-watermark"></div>
</div>

<script>
(function() {
    // Configuration
    const CONFIG = {
        streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/StarSportsHD2Hin_BTS/output/index.mpd",
        keyId: "bd1ea6a1c1fb5dcdb709434e0826bbc0",
        key: "f57f22cba32739ce7beb1fab3f3d060b",
        cookieUrl: "https://raw.githubusercontent.com/ascal-dev/matchlinks-jsontom3u/main/starsports2h.json"
    };

    document.addEventListener("DOMContentLoaded", async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            console.error("Browser not supported!");
            return;
        }

        const video = document.getElementById("video");
        const container = document.getElementById("player-container");

        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);

        // UI Configuration - FIXED syntax here
        ui.configure({
            addBigPlayButton: true,
            controlPanelElements: [
                'play_pause',
                'time_and_duration',
                'mute',
                'volume',
                'spacer',
                'language',
                'captions',
                'picture_in_picture',
                'quality',
                'fullscreen'
            ],
            volumeBarColors: {
                base: 'rgba(63, 187, 1, 1)',
                level: 'rgb(255, 69, 0)'
            },
            seekBarColors: {
                base: 'rgb(41, 41, 163)',
                buffered: 'rgb(35, 99, 3)',
                played: 'rgba(63, 187, 1, 1)'
            }
        });

        // Player DRM and Streaming Configuration
        player.configure({
            drm: {
                clearKeys: {
                    [CONFIG.keyId]: CONFIG.key
                }
            },
            streaming: {
                lowLatencyMode: true,
                bufferingGoal: 15,
                rebufferingGoal: 2,
                bufferBehind: 15,
                retryParameters: {
                    timeout: 10000,
                    maxAttempts: 5,
                    baseDelay: 300,
                    backoffFactor: 1.2
                },
                segmentRequestTimeout: 8000,
                segmentPrefetchLimit: 2,
                useNativeHlsOnSafari: true
            },
            manifest: {
                retryParameters: {
                    timeout: 8000,
                    maxAttempts: 3
                }
            }
        });

        // Request Filter for Cookies/Headers
        let cookieValue = "";
        try {
            const response = await fetch(CONFIG.cookieUrl, { cache: "no-store" });
            const data = await response.json();
            cookieValue = data.cookie || "";
        } catch (e) {
            console.error("Cookie fetch failed", e);
        }

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            
            if (cookieValue) {
                request.headers["Cookie"] = cookieValue;
                let urlCookie = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;

                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
                    !request.uris[0].includes("__hdnea__")) {
                    const sep = request.uris[0].includes("?") ? "&" : "?";
                    request.uris[0] += sep + "__hdnea__=" + urlCookie;
                }
            }
        });

        // Load Stream
        try {
            await player.load(CONFIG.streamUrl);
            video.play().catch(() => {
                console.log("Autoplay blocked; waiting for user interaction.");
            });
        } catch (e) {
            console.error("Error loading stream", e);
        }

        // Unmute on first play
        video.addEventListener("play", () => {
            video.muted = false;
        }, { once: true });

    });
})();
</script>

</body>
</html>
