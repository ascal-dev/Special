<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Willow Ultra Live - Colorful & Instant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; height: 100vh; }
        .video-container { width: 100%; height: 100%; position: absolute; background: #000; }
        
        /* Ensure the UI takes up the full container */
        .shaka-video-container { width: 100%; height: 100%; }
        
        /* Hiding the loading spinner for the 'instant' feel */
        .shaka-spinner-container { display: none !important; }
    </style>
</head>

<body>
    <div class="video-container" data-shaka-player-container>
        <video autoplay muted data-shaka-player id="video" style="width:100%; height:100%;"></video>
    </div>

    <script>
        async function init() {
            const video = document.getElementById("video");
            const ui = video.ui;
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // 1. STREAMING & DRIVING CONFIGURATION
            player.configure({
                drm: {
                    clearKeys: {
                        '3813110878620e2085a6ce8c65154a67': "8d7ed0389021ee3aa4e87e7aaeb3b5a0"
                    }
                },
                mediaSource: {
                    forceTransmux: true 
                },
                streaming: {
                    bufferingGoal: 1.5,          // Tight buffer for zero lag
                    rebufferingGoal: 0.1,        // Instant resume
                    bufferBehind: 0,
                    lowLatencyMode: true,
                    retryParameters: {
                        maxAttempts: 20,
                        baseDelay: 50,
                        timeout: 2000
                    }
                },
                manifest: {
                    dash: {
                        autoCorrectDrift: true,
                        ignoreSuggestedPresentationDelay: true,
                        ignoreMinimumUpdatePeriod: true
                    },
                    updatePeriodOverride: 0.1    // Aggressive manifest polling
                }
            });

            // 2. COLORFUL UI CONFIGURATION
            ui.configure({
                controlPanelElements: ["play_pause", "mute", "volume", "spacer", "time_and_duration", "quality", "fullscreen", "overflow_menu"],
                // Custom Colorful Volume Bar
                volumeBarColors: {
                    base: "rgba(0, 0, 255, 1)",  // Blue base
                    level: "rgb(0, 255, 0)"      // Green level
                },
                // Custom Colorful Seek Bar
                seekBarColors: {
                    base: "rgb(255, 0, 0)",       // Red base
                    buffered: "rgb(255, 255, 0)", // Yellow buffered
                    played: "rgba(0, 128, 128, 1)" // Teal played
                }
            });

            // 3. NETWORK ENGINE - PRIORITIZE FETCHING
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    request.allowCrossSiteCredentials = true;
                }
            });

            // 4. ANTI-LAG SYNC LOGIC
            setInterval(() => {
                if (player.isLive()) {
                    const range = player.seekRange();
                    const delay = range.end - video.currentTime;

                    // Level 1: Subtle speed-up if slightly behind
                    if (delay > 1.2 && delay < 4) {
                        video.playbackRate = 1.1; 
                    } 
                    // Level 2: Instant jump if lag is significant
                    else if (delay >= 4) {
                        video.currentTime = range.end;
                        video.playbackRate = 1.0;
                    } else {
                        video.playbackRate = 1.0;
                    }
                }
            }, 500);

            try {
                const manifestUri = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/hkosbvm6yg/out/v1/94f33099d3184ce4b22377e4e4e33d91/cenc.mpd";
                await player.load(manifestUri);
                
                // Snap to live edge on start
                video.currentTime = player.seekRange().end;
            } catch (error) {
                console.error("Load Error:", error);
                setTimeout(() => window.location.reload(), 1500);
            }
        }

        document.addEventListener("shaka-ui-loaded", init);
        
        // Handle browser autoplay restrictions
        document.addEventListener('click', () => {
            const video = document.getElementById("video");
            if (video.paused) video.play();
        }, { once: true });
    </script>
</body>
</html>
