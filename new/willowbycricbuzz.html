<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Willow Ultra Live - v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; height: 100vh; }
        .video-container { width: 100%; height: 100%; position: absolute; }
        /* Hide unnecessary UI elements for a cleaner live experience */
        .shaka-spinner-container { display: none !important; }
        .shaka-load-error-popover { display: none !important; }
    </style>
</head>

<body>
    <div class="video-container" data-shaka-player-container>
        <video autoplay muted data-shaka-player id="video" style="width:100%; height:100%; object-fit: contain;"></video>
    </div>

    <script>
        async function init() {
            const video = document.getElementById("video");
            const ui = video.ui;
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // 1. AGGRESSIVE CONFIGURATION
            player.configure({
                drm: {
                    clearKeys: {
                        '3813110878620e2085a6ce8c65154a67': "8d7ed0389021ee3aa4e87e7aaeb3b5a0"
                    }
                },
                streaming: {
                    // Parallel fetching and stability
                    bufferingGoal: 3,            // Keep 3s of data to prevent micro-stutter
                    rebufferingGoal: 0.2,        // Restart playback nearly instantly
                    bufferBehind: 0,             // Flush old data immediately
                    alwaysStreamText: true,
                    infiniteLiveDelay: false,
                    lowLatencyMode: true,        // Critical for LL-DASH
                    forceTransmuxTS: true,       // Faster processing of TS segments
                    
                    retryParameters: {
                        maxAttempts: 20,         // Never stop trying to fetch
                        baseDelay: 100,          // Rapid retry loop
                        timeout: 2000            // Don't wait more than 2s for a segment
                    }
                },
                manifest: {
                    dash: {
                        autoCorrectDrift: true,
                        ignoreSuggestedPresentationDelay: true,
                        ignoreMinimumUpdatePeriod: false
                    },
                    updatePeriodOverride: 0.2    // Refresh manifest every 200ms
                }
            });

            // 2. NETWORK INTERCEPTOR (MULTIPLE REQUESTS LOGIC)
            // This ensures every request is treated with high priority and minimal timeout
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    request.retryParameters.timeout = 1500;
                    request.allowCrossSiteCredentials = true;
                }
            });

            // 3. ZERO-LATENCY MONITOR (The "Snap" Logic)
            setInterval(() => {
                if (player.isLive()) {
                    const range = player.seekRange();
                    const diff = range.end - video.currentTime;

                    // Level 1: Subtle Catch-up (1.1x speed if > 1s behind)
                    if (diff > 1 && diff <= 3) {
                        video.playbackRate = 1.1;
                    } 
                    // Level 2: Hard Snap (Jump if > 3s behind)
                    else if (diff > 3) {
                        video.currentTime = range.end;
                        video.playbackRate = 1.0;
                    } 
                    else {
                        video.playbackRate = 1.0;
                    }
                }
            }, 500);

            // 4. LOAD & AUTO-SYNC
            try {
                const streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/hkosbvm6yg/out/v1/94f33099d3184ce4b22377e4e4e33d91/cenc.mpd";
                await player.load(streamUrl);
                
                // Immediately jump to the absolute edge on load
                video.currentTime = player.seekRange().end;
                console.log("Ultra-Live Stream Connected");
            } catch (e) {
                console.error("Load Error:", e);
                // Auto-reload on fatal error
                setTimeout(() => window.location.reload(), 2000);
            }
        }

        // Initialize on UI load
        document.addEventListener("shaka-ui-loaded", init);
        
        // Prevent context menu to keep interaction focused
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
