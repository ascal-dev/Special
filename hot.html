<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container that scales with the viewport */
        .shaka-video-container {
            width: 100%;
            max-width: 1200px;
            height: auto;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Minimal adjustments to UI overlay to keep it clean */
        .shaka-controls-container .shaka-bottom-controls {
            display: flex;
            flex-direction: column;
        }
        
        /* Hiding specific elements you mentioned removing */
        .channel-info, #status {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="shaka-video-container" id="player-container" data-shaka-player-container>
        <video id="video" autoplay playsinline preload="metadata" data-shaka-player></video>
    </div>

    <script>
        /* ── CONFIGURATION RECEIVED FROM SERVER ── */
        const SERVER_CONFIG = {
            "hasChannel": true,
            "streamUrls": ["https:\/\/jiotvmblive.cdn.jio.com\/bpk-tv\/ColorsHD_MOB\/WDVLive\/index.mpd"],
            "primaryCookie": "__hdnea__=st=1776072494~exp=1776094094~acl=\/*~hmac=d874fca92f2821b5319af300c1131c1071a5e84e4a91d91060c265d0a6e80fd1",
            "fallbackCookie": "",
            "keyId": "5360e12d4bb2519a9148d1089a55908d",
            "key": "7e8f500cef51595f3d43acafab1a8fb4"
        };

        document.addEventListener("DOMContentLoaded", async () => {
            if (!SERVER_CONFIG.hasChannel || SERVER_CONFIG.streamUrls.length === 0) return;

            const { streamUrls, primaryCookie, fallbackCookie, keyId, key } = SERVER_CONFIG;

            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return;

            const videoEl = document.getElementById("video");
            const container = document.getElementById("player-container");

            // Initialize Player and UI
            const player = new shaka.Player(videoEl);
            const ui = new shaka.ui.Overlay(player, container, videoEl);
            
            // Customize UI controls (optional)
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'volume', 'fullscreen', 'overflow_menu'],
                'addLanguageControls': false
            });

            // Configure DRM and Streaming
            const config = {
                streaming: { 
                    lowLatencyMode: true,
                    bufferingGoal: 10,
                    rebufferingGoal: 2
                }
            };

            if (keyId && key) {
                config.drm = {
                    clearKeys: { [keyId]: key }
                };
            }
            player.configure(config);

            // Request Filter for Headers and Cookies
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers["Referer"] = "https://www.jiotv.com/";
                request.headers["User-Agent"] = "plaYtv/7.1.5";

                if (primaryCookie && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] = request.uris[0].split("?")[0] + "?" + primaryCookie;
                }
            });

            // Load logic with fallback support
            const cookieRounds = [primaryCookie];
            if (fallbackCookie && fallbackCookie !== primaryCookie) cookieRounds.push(fallbackCookie);

            let loaded = false;
            
            for (const cookie of cookieRounds) {
                for (const url of streamUrls) {
                    try {
                        await player.load(url);
                        videoEl.play().catch(() => {
                            // Handle potential Autoplay block
                            console.log("Autoplay blocked, waiting for user interaction.");
                        });
                        loaded = true;
                        break;
                    } catch (e) {
                        console.error("Load attempt failed for URL:", url);
                    }
                }
                if (loaded) break;
            }
        });
    </script>
</body>
</html>
