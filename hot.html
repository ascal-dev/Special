<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Engine | MPD + Cookies</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #video-container { width: 95%; max-width: 1000px; aspect-ratio: 16/9; background: #111; position: relative; border: 1px solid #333; }
        video { width: 100%; height: 100%; }
        .overlay-status { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 12px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; pointer-events: none; }
    </style>
</head>
<body>

    <div data-shaka-player-container id="video-container">
        <div class="overlay-status" id="status">Syncing Cookies...</div>
        <video data-shaka-player id="video" autoplay></video>
    </div>

    <script>
        const RAW_DRM = 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/drm.json';
        const RAW_COOKIE = 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/cookie.json';

        async function initStream() {
            shaka.polyfill.installAll();

            const video = document.getElementById('video');
            const container = document.getElementById('video-container');
            const status = document.getElementById('status');
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            try {
                // 1. Fetch Dynamic Data
                const [drm, cookieData] = await Promise.all([
                    fetch(RAW_DRM).then(res => res.json()),
                    fetch(RAW_COOKIE).then(res => res.json())
                ]);

                // 2. The Core Request Logic: Binding Cookies to the .mpd and segments
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    // This injects your cookies into the .mpd manifest request AND all following segments
                    request.headers['Cookie'] = cookieData.Cookie;
                    request.headers['Origin'] = cookieData.Origin;
                    request.headers['Referer'] = cookieData.Referer;
                    
                    // Essential for passing cookies cross-domain
                    request.allowCrossDomainCredentials = true;
                });

                // 3. Select first channel from your drm.json
                const channel = drm[0]; 
                const [kid, key] = channel.key.split(':');

                // 4. Configure DRM & Load
                player.configure({
                    drm: {
                        clearKeys: { [kid]: key }
                    }
                });

                status.innerText = `Streaming: ${channel.name} (Auth Injected)`;
                await player.load(channel.url);

            } catch (e) {
                status.innerText = "Auth Error: Check Console";
                console.error("Stream failed:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', initStream);
        document.addEventListener('DOMContentLoaded', () => { if (window.shaka && !window.player) initStream(); });
    </script>
</body>
</html>
