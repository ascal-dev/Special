<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Shaka Streamer Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    
    <style>
        :root { --accent: #00ff88; }
        body { 
            margin: 0; background: #0a0a0a; color: #eee; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }
        .container { width: 100%; max-width: 1000px; }
        
        /* Video Container Styling */
        #video-container { 
            width: 100%; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #000; border: 1px solid #333;
        }
        video { width: 100%; height: 100%; }

        /* UI Styling */
        .controls-card {
            background: #1a1a1a; padding: 20px; border-radius: 0 0 12px 12px;
            border: 1px solid #333; border-top: none;
        }
        select {
            width: 100%; padding: 12px; background: #222; color: var(--accent);
            border: 1px solid #444; border-radius: 8px; font-size: 16px; outline: none;
            cursor: pointer; transition: 0.3s;
        }
        select:hover { border-color: var(--accent); }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            background: #333; font-size: 12px; margin-bottom: 10px; color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge" id="status-badge">System: Initializing</div>
        
        <div data-shaka-player-container id="video-container">
            <video data-shaka-player id="video" autoplay></video>
        </div>

        <div class="controls-card">
            <label style="display:block; margin-bottom: 8px; font-weight: bold;">CHANNEL SELECTION</label>
            <select id="channelSelect">
                <option>Loading Dynamic Data...</option>
            </select>
        </div>
    </div>

    <script>
        const CONFIG = {
            cookieUrl: 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/cookie.json',
            drmUrl: 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/drm.json'
        };

        let player, ui, videoElement, controls;

        async function init() {
            // 1. Install polyfills (Fixed the typo)
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                updateStatus("Browser not supported!");
                return;
            }

            videoElement = document.getElementById('video');
            const container = document.getElementById('video-container');
            
            // 2. Initialize Player & UI
            player = new shaka.Player(videoElement);
            ui = new shaka.ui.Overlay(player, container, videoElement);
            controls = ui.getControls();

            try {
                updateStatus("Fetching Auth & Manifest...");
                const [cookieRes, drmRes] = await Promise.all([
                    fetch(CONFIG.cookieUrl),
                    fetch(CONFIG.drmUrl)
                ]);

                const auth = await cookieRes.json();
                const channels = await drmRes.json();

                // 3. Advanced Networking Configuration
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    // Inject headers into every request
                    request.headers['Cookie'] = auth.Cookie;
                    request.headers['Origin'] = auth.Origin;
                    request.headers['Referer'] = auth.Referer;
                    
                    // Specific fix for certain streaming environments
                    request.allowCrossDomainCredentials = true;
                });

                // 4. Setup Channel Switcher
                const selector = document.getElementById('channelSelect');
                selector.innerHTML = '';
                channels.forEach((ch, index) => {
                    let opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = `▶ ${ch.name}`;
                    selector.appendChild(opt);
                });

                selector.onchange = () => {
                    loadChannel(channels[selector.value]);
                };

                // Load default
                loadChannel(channels[0]);
                updateStatus("System: Online / Stream Live");

            } catch (e) {
                updateStatus("Critical Error: Failed to fetch JSON");
                console.error(e);
            }
        }

        async function loadChannel(channel) {
            updateStatus(`Switching to ${channel.name}...`);
            
            // ClearKey Logic
            const keyParts = channel.key.split(':');
            const drmConfig = {
                clearKeys: {
                    [keyParts[0]]: keyParts[1]
                }
            };

            player.configure({ drm: drmConfig });

            try {
                await player.load(channel.url);
            } catch (error) {
                console.error("Error Code:", error.code, error);
                if(error.code === 1001) {
                    updateStatus("Error: CORS / Header Blocked by Browser");
                } else {
                    updateStatus("Error: Playback failed");
                }
            }
        }

        function updateStatus(msg) {
            document.getElementById('status-badge').innerText = msg;
        }

        // Initialize when UI library is ready
        document.addEventListener('shaka-ui-loaded', init);
        // Fallback for direct loads
        document.addEventListener('DOMContentLoaded', () => {
            if (window.shaka && !player) init();
        });
    </script>
</body>
</html>
