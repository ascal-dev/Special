<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotstar Ultra Bypass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }
        #video-container { width: 90%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #222; }
        #status { margin-bottom: 10px; color: #00ff88; font-family: monospace; }
        select { margin-top: 15px; padding: 10px; background: #111; color: #fff; border: 1px solid #333; width: 300px; }
    </style>
</head>
<body>

    <div id="status">Bypass Engine: Ready</div>
    <div data-shaka-player-container id="video-container">
        <video data-shaka-player id="video" autoplay style="width:100%; height:100%"></video>
    </div>
    <select id="channelList"><option>Fetching Streams...</option></select>

    <script>
        const COOKIE_JSON = 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/cookie.json';
        const DRM_JSON = 'https://raw.githubusercontent.com/hasanhabibmottakin/jch/main/drm.json';

        let player;

        async function initApp() {
            shaka.polyfill.installAll();

            const video = document.getElementById('video');
            const container = document.getElementById('video-container');
            player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            try {
                const [cookieData, drmData] = await Promise.all([
                    fetch(COOKIE_JSON).then(r => r.json()),
                    fetch(DRM_JSON).then(r => r.json())
                ]);

                // --- THE URL REWRITE ENGINE ---
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    // Extract the raw cookie string
                    const cookieStr = cookieData.Cookie;
                    const ua = "Hotstar;in.startv.hotstar/25.02.24.8.11169 (Android/15)";
                    const origin = cookieData.Origin;
                    const referer = cookieData.Referer;

                    // Construct the decoration string
                    // We use encodeURIComponent to ensure special characters (~, =, /) don't break the URL
                    const decoration = `|Cookie=${encodeURIComponent(cookieStr)}&User-agent=${encodeURIComponent(ua)}&Origin=${encodeURIComponent(origin)}&Referer=${encodeURIComponent(referer)}`;

                    // Append to the URL. If URL already has ?, use &, else use ?
                    if (request.uris[0].includes('?')) {
                        request.uris[0] += `&${decoration}`;
                    } else {
                        request.uris[0] += `?${decoration}`;
                    }
                });

                // Populate UI
                const selector = document.getElementById('channelList');
                selector.innerHTML = '';
                drmData.forEach((ch, i) => {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.innerText = ch.name;
                    selector.appendChild(opt);
                });

                selector.onchange = () => loadChannel(drmData[selector.value]);
                
                // Load default
                loadChannel(drmData[0]);

            } catch (e) {
                document.getElementById('status').innerText = "Initialization Error";
                console.error(e);
            }
        }

        async function loadChannel(ch) {
            document.getElementById('status').innerText = `Injecting Auth: ${ch.name}`;
            const [kid, key] = ch.key.split(':');

            player.configure({
                drm: {
                    clearKeys: { [kid]: key }
                },
                streaming: {
                    lowLatencyMode: true,
                    jumpLargeGaps: true
                }
            });

            try {
                await player.load(ch.url);
                document.getElementById('status').innerText = `Playing: ${ch.name}`;
            } catch (e) {
                document.getElementById('status').innerText = `Error ${e.code}: Check CORS Extension`;
                console.error(e);
            }
        }

        document.addEventListener('shaka-ui-loaded', initApp);
    </script>
</body>
</html>
