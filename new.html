<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JioTV Stream Player - Proxy Integrated</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: system-ui, sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .hidden { display: none !important; }
        #gridView { padding: 20px; height: 100vh; overflow-y: auto; }
        #jiotvGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .channel-card { background: #111; border-radius: 12px; cursor: pointer; border: 1px solid #222; text-align: center; }
        .channel-card img { width: 100%; aspect-ratio: 16/9; object-fit: contain; }
        #playerView { position: fixed; inset: 0; background: #000; z-index: 9999; }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 10001; background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .shaka-video-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="gridView">
        <h2 style="text-align: center; margin-bottom: 20px;">JioTV Live</h2>
        <div id="jiotvGrid">Loading Channels...</div>
    </div>

    <div id="playerView" class="hidden">
        <button class="back-btn" onclick="closePlayer()">✕ Back</button>
        <div class="shaka-video-container" data-shaka-player-container>
            <video autoplay playsinline id="video" data-shaka-player></video>
        </div>
    </div>

    <script>
        let allChannels = [];
        let player = null;
        const PROXY_URL = "https://new.godess.workers.dev/?url=";

        async function loadPlaylist() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/ascal-dev/matchlinks-jsontom3u/main/ascaljtv.m3u');
                const text = await response.text();
                allChannels = parseM3U(text);
                renderChannels(allChannels);
            } catch (err) { console.error("Playlist error", err); }
        }

        function parseM3U(txt) {
            const channels = [];
            const lines = txt.split('\n');
            let current = null;
            let props = {};

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    current = { name: line.split(',')[1], logo: (line.match(/tvg-logo="([^"]+)"/) || [])[1] };
                    props = {};
                } else if (line.startsWith('#KODIPROP:')) {
                    const m = line.match(/#KODIPROP:([^=]+)=(.+)/);
                    if (m) { if (!props.kodi) props.kodi = {}; props.kodi[m[1]] = m[2]; }
                } else if (line && !line.startsWith('#') && current) {
                    const parts = line.split('|cookie=');
                    current.url = parts[0].split('&xxx=')[0];
                    if (parts[1]) { props.cookie = parts[1].trim(); }
                    current.props = props;
                    channels.push(current);
                    current = null;
                }
            });
            return channels;
        }

        function renderChannels(list) {
            const grid = document.getElementById('jiotvGrid');
            grid.innerHTML = list.map((ch) => `
                <div class="channel-card" onclick="openPlayer('${encodeURIComponent(JSON.stringify(ch))}')">
                    <img src="${ch.logo}">
                    <div style="padding:10px">${ch.name}</div>
                </div>
            `).join('');
        }

        async function openPlayer(encoded) {
            const ch = JSON.parse(decodeURIComponent(encoded));
            const video = document.getElementById('video');
            const cookieVal = ch.props?.cookie || "";
            
            document.getElementById('gridView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');

            shaka.polyfill.installAll();
            if (player) await player.destroy();
            player = new shaka.Player(video);

            // Configure ClearKey DRM
            let drmConfig = { clearKeys: {} };
            const licenseKey = ch.props?.kodi?.['inputstream.adaptive.license_key'] || "";
            if (licenseKey.includes(':')) {
                const [kid, key] = licenseKey.split(':');
                drmConfig.clearKeys[kid] = key;
            }
            player.configure({ drm: drmConfig });

            // AGGRESSIVE PROXYING
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                let originalUri = request.uris[0];
                
                // 1. Skip if already proxied
                if (originalUri.startsWith(PROXY_URL)) return;

                // 2. Attach Cookie to URI
                const sep = originalUri.includes('?') ? '&' : '?';
                const finalUriWithToken = originalUri.includes('__hdnea__') ? originalUri : originalUri + sep + cookieVal;

                // 3. Wrap in Cloudflare Proxy
                request.uris = [PROXY_URL + encodeURIComponent(finalUriWithToken)];
            });

            try {
                // Initial Load through proxy
                const initialUrl = ch.url + (ch.url.includes('?') ? '&' : '?') + cookieVal;
                await player.load(PROXY_URL + encodeURIComponent(initialUrl));
                video.play();
            } catch (e) { console.error("Stream Error", e); }
        }

        function closePlayer() {
            document.getElementById('video').pause();
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('gridView').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', loadPlaylist);
    </script>
</body>
</html>
